{% extends 'base.html' %}
{% block content %}
    <h1>Candidate Profile</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Full Name:</label>
        <input type="text" name="full_name" value="{{ profile.full_name|default:'' }}" required>
        <label>Phone:</label>
        <input type="text" name="phone" value="{{ profile.phone|default:'' }}" required><br><br>
        <label>Date of Birth:</label>
        <input type="date" name="date_of_birth" value="{{ profile.date_of_birth|default:'' }}" required><br><br>
        <label>Gender:</label>
        <select name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
        </select><br><br>
        <label>Bio:</label>
        <textarea name="bio">{{ profile.bio|default:'' }}</textarea><br><br>
        <label>Profile Picture:</label>
        <input type="file" name="profile_picture"><br><br>
        <label>GitHub:</label>
        <input type="url" name="github" value="{{ profile.github|default:'' }}"><br><br>
        <label>LinkedIn:</label>
        <input type="url" name="linkedin" value="{{ profile.linkedin|default:'' }}"><br><br>
        <input type="submit" value="Save Profile">
    </form>
{% endblock %}
