<!DOCTYPE html>
<html>
<head>
    <title>Job Hunt</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            font-size: 18px;
            color: #333;
        }

        header{
            background: #333;
            color: white;
            text-align: center;
            padding: 18px;
        }

        header h1{
            margin: 0;
            font-size: 28px;
        }

        nav{
            background: white;
            padding: 15px;
            border-bottom: 1px solid #ddd;
        }

        nav a{
            text-decoration: none;
            color: #333;
            margin-right: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        nav a:hover{
            text-decoration: underline;
        }

        .container{
            max-width: 900px;
            margin: 25px auto;
            background: white;
            padding: 25px;
            border: 1px solid #ddd;
        }

        h1{
            font-size: 32px;
        }

        h2{
            font-size: 28px;
        }

        h3{
            font-size: 24px;
        }

        p{
            font-size: 18px;
            line-height: 1.6;
        }

        label{
            display: block;
            font-weight: bold;
            font-size: 18px;
            margin-top: 12px;
            margin-bottom: 5px;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 10px;
            font-size: 17px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        textarea{
            min-height: 100px;
        }

        button,
        input[type="submit"]{
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 17px;
            cursor: pointer;
        }

        button:hover,
        input[type="submit"]:hover{
            background: #555;
        }

        img{
            max-width: 150px;
            height: auto;
        }

        a{
            color: #0066cc;
        }

    </style>
</head>

<body>

    <header>
        <h1>Job Hunt</h1>
    </header>

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'change_password' %}">Change Password</a>
            <a href="{% url 'ulogout' %}">Logout</a>
        {% else %}
            <a href="{% url 'ulogin' %}">Login</a>
            <a href="{% url 'usignup' %}">Signup</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
